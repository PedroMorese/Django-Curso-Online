{% extends "base/base.html" %}

{% block body %}
<div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside
        class="w-64 flex-shrink-0 border-r border-slate-200 dark:border-slate-800 bg-background-light dark:bg-background-dark flex flex-col justify-between">
        {% block sidebar %}{% endblock %}
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col overflow-y-auto">
        <!-- Top Navbar -->
        <header
            class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 px-8 py-4 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-10">
            {% block topbar %}{% endblock %}
        </header>

        <!-- Page Content -->
        <div class="p-8">
            {% block dashboard_content %}{% endblock %}
        </div>
    </main>
</div>
{% endblock %}
