<body class="bg-background-light dark:bg-background-dark font-display">
    <div class="relative w-full h-screen overflow-hidden flex flex-col blur-sm opacity-50">
        <header
            class="flex items-center justify-between whitespace-nowrap border-b border-solid border-b-[#283039] px-10 py-3 bg-[#111418]">
            <div class="flex items-center gap-8">
                <div class="flex items-center gap-4 text-white">
                    <div class="size-6 flex items-center justify-center">
                        <span class="material-symbols-outlined text-primary">school</span>
                    </div>
                    <h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em]">EduPlatform</h2>
                </div>
                <div class="hidden md:flex items-center gap-9">
                    <a class="text-white/70 text-sm font-medium leading-normal" href="#">Courses</a>
                    <a class="text-white/70 text-sm font-medium leading-normal" href="#">Mentors</a>
                    <a class="text-white/70 text-sm font-medium leading-normal" href="#">Pricing</a>
                </div>
            </div>
            <div class="flex gap-2">
                <div class="w-20 h-8 bg-primary rounded-lg"></div>
            </div>
        </header>
        <div class="flex-1 flex flex-col items-center justify-center p-20">
            <div class="w-full max-w-4xl h-[400px] rounded-xl bg-cover bg-center"
                style='background-image: linear-gradient(rgba(16, 25, 34, 0.8), rgba(16, 25, 34, 0.8)), url("https://lh3.googleusercontent.com/aida-public/AB6AXuD5hnmQBQE_r_8zYWmVO4wPfnOR83hN8KT0UWmlx4ZRZU-DmOlfoWaItdQh0oapuUyvnIpMIHQAXgZ8KvDXnT8AliYUZ1Xh0q8U-YpxkW9PajPTjhe899h1UXOfrZbFe6lR0grMFiJ7AwCBoM5iKuNoEmPhUZlg-GSL03d4LjGBcsNYEnGluaAr3CoIbGluxl0fiMYP_TOkZs9gbx4QeXPKv29wiUufvJxQ43I9OdPWm2bCIvrTSqQYt5QbHTJEAj1HZQiU2CP3mw");'>
                <div class="p-20">
                    <div class="h-12 w-2/3 bg-white/10 rounded mb-4"></div>
                    <div class="h-6 w-1/2 bg-white/5 rounded"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-md p-4">
        <div class="w-full max-w-[440px] bg-[#111418] border border-[#283039] rounded-xl shadow-2xl overflow-hidden">
            <div class="px-8 pt-8 pb-4">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-white text-3xl font-bold tracking-tight">Welcome Back</h2>
                    <button class="text-[#9dabb9] hover:text-white transition-colors">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                <p class="text-[#9dabb9] text-sm">Please enter your details to sign in.</p>
            </div>
            <form class="px-8 py-4">
                <div class="mb-5">
                    <label class="flex flex-col">
                        <p class="text-[#9dabb9] text-xs font-semibold uppercase tracking-wider pb-2">Email Address</p>
                        <input
                            class="form-input flex w-full rounded-lg text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-[#3b4754] bg-[#1c2127] focus:border-primary h-12 placeholder:text-[#5c6b7a] px-4 text-base font-normal transition-all"
                            placeholder="email@example.com" required="" type="email" />
                    </label>
                </div>
                <div class="mb-8">
                    <div class="flex justify-between items-center pb-2">
                        <p class="text-[#9dabb9] text-xs font-semibold uppercase tracking-wider">Password</p>
                        <a class="text-primary text-xs font-semibold hover:underline underline-offset-4" href="#">Forgot
                            Password?</a>
                    </div>
                    <div class="relative">
                        <input
                            class="form-input flex w-full rounded-lg text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-[#3b4754] bg-[#1c2127] focus:border-primary h-12 placeholder:text-[#5c6b7a] px-4 text-base font-normal transition-all"
                            placeholder="Enter your password" required="" type="password" />
                        <span
                            class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-[#5c6b7a] cursor-pointer text-xl">visibility_off</span>
                    </div>
                </div>
                <button
                    class="w-full flex items-center justify-center overflow-hidden rounded-lg h-14 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] hover:bg-primary/90 transition-all shadow-lg shadow-primary/20"
                    type="submit">
                    Login
                </button>
            </form>
            <div class="px-8 pb-10 pt-4 text-center">
                <p class="text-[#9dabb9] text-sm">
                    Don't have an account?
                    <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Register</a>
                </p>
            </div>
        </div>
    </div>

</body>
